name: Build (Multi OS)

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: build-multi-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: linux-x86_64
            os: ubuntu-latest
            binary_name: ato
            build_target: x86_64-unknown-linux-gnu
            rustflags: ""
          - artifact_name: linux-aarch64
            os: ubuntu-latest
            binary_name: ato
            build_target: aarch64-unknown-linux-gnu
            rustflags: ""
          - artifact_name: macos-host
            os: macos-latest
            binary_name: ato
            build_target: ""
            rustflags: ""
          - artifact_name: windows-x86_64
            os: windows-latest
            binary_name: ato.exe
            build_target: x86_64-pc-windows-msvc
            rustflags: -C target-feature=+crt-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify version source of truth
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$cargo_version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag_version" != "$cargo_version" ]]; then
              echo "Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)" >&2
              exit 1
            fi
          fi

          version_input="${{ github.event.inputs.version }}"
          if [[ -n "$version_input" ]]; then
            version_input="${version_input#v}"
            if [[ ! "$version_input" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid workflow input version: $version_input" >&2
              exit 1
            fi
            if [[ "$version_input" != "$cargo_version" ]]; then
              echo "workflow_dispatch version ($version_input) must match Cargo.toml version ($cargo_version)" >&2
              exit 1
            fi
          fi

      - name: Validate Cargo.lock is up to date
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo metadata --locked --format-version 1 >/dev/null 2>&1; then
            echo "Cargo.lock is out of date for the current Cargo.toml." >&2
            echo "Run 'cargo generate-lockfile' (or 'cargo check') locally and commit Cargo.lock." >&2
            exit 1
          fi

      - name: Install aarch64 Linux cross toolchain
        if: ${{ matrix.build_target == 'aarch64-unknown-linux-gnu' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Add Rust target
        if: ${{ matrix.build_target != '' }}
        shell: bash
        run: |
          set -euo pipefail
          rustup target add "${{ matrix.build_target }}"

      - name: Build release binary
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.build_target }}" ]]; then
            cargo build --release --locked --target "${{ matrix.build_target }}" --bin ato
          else
            cargo build --release --locked --bin ato
          fi

      - name: Package target archive and checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ matrix.build_target }}" ]]; then
            resolved_target="${{ matrix.build_target }}"
          else
            resolved_target="$(rustc -vV | sed -n 's/^host: //p')"
          fi
          if [[ -z "$resolved_target" ]]; then
            echo "failed to detect target triple" >&2
            exit 1
          fi

          mkdir -p dist/payload
          binary_path="target/release/${{ matrix.binary_name }}"
          if [[ -n "${{ matrix.build_target }}" ]]; then
            binary_path="target/${{ matrix.build_target }}/release/${{ matrix.binary_name }}"
          fi
          cp "$binary_path" "dist/payload/${{ matrix.binary_name }}"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            archive_name="ato-${resolved_target}.zip"
            powershell.exe -NoProfile -Command "Push-Location 'dist/payload'; Compress-Archive -Path '${{ matrix.binary_name }}' -DestinationPath '../${archive_name}' -Force; Pop-Location"
          else
            archive_name="ato-${resolved_target}.tar.gz"
            tar -C dist/payload -czf "dist/${archive_name}" "${{ matrix.binary_name }}"
          fi

          if command -v python3 >/dev/null 2>&1; then
            py_cmd=python3
          elif command -v python >/dev/null 2>&1; then
            py_cmd=python
          else
            echo "python3/python is required to generate SHA256SUMS" >&2
            exit 1
          fi

          "$py_cmd" - <<'PY'
            from pathlib import Path
            import hashlib

            dist = Path("dist")
            archive = next(dist.glob("ato-*.tar.gz"), None)
            if archive is None:
              archive = next(dist.glob("ato-*.zip"), None)
            if archive is None:
              raise SystemExit("archive not found in dist")

            h = hashlib.sha256()
            with archive.open("rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)

            (dist / "SHA256SUMS").write_text(f"{h.hexdigest()}  {archive.name}\n", encoding="utf-8")
            PY

          echo "$resolved_target" > "dist/target-triple.txt"
          echo "target_triple=$resolved_target" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            dist/ato-*.tar.gz
            dist/ato-*.zip
            dist/SHA256SUMS
            dist/target-triple.txt
          if-no-files-found: error

  smoke:
    name: Smoke ${{ matrix.artifact_name }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: linux-x86_64
            os: ubuntu-latest
            binary_name: ato
            qemu_arm: false
          - artifact_name: linux-aarch64
            os: ubuntu-latest
            binary_name: ato
            qemu_arm: true
          - artifact_name: macos-host
            os: macos-latest
            binary_name: ato
            qemu_arm: false
          - artifact_name: windows-x86_64
            os: windows-latest
            binary_name: ato.exe
            qemu_arm: false

    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: /tmp/ato-smoke

      - name: Prepare extracted binary
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ato-bin
          archive="$(find /tmp/ato-smoke -maxdepth 1 -type f \( -name 'ato-*.tar.gz' -o -name 'ato-*.zip' \) | head -n1)"
          if [[ -z "$archive" ]]; then
            echo "No archive found in /tmp/ato-smoke" >&2
            exit 1
          fi

          if [[ "$archive" == *.zip ]]; then
            archive_win="$(cygpath -w "$archive")"
            dest_win="$(cygpath -w /tmp/ato-bin)"
            powershell.exe -NoProfile -Command "Expand-Archive -Path '$archive_win' -DestinationPath '$dest_win' -Force"
          else
            tar -C /tmp/ato-bin -xzf "$archive"
          fi

          binary_path="/tmp/ato-bin/${{ matrix.binary_name }}"
          if [[ ! -f "$binary_path" ]]; then
            echo "Extracted binary not found: $binary_path" >&2
            exit 1
          fi
          chmod +x "$binary_path" || true
          echo "binary=$binary_path" >> "$GITHUB_OUTPUT"

      - name: Install ARM runtime tools
        if: ${{ matrix.qemu_arm }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user-static libc6-arm64-cross

      - name: Smoke (aarch64 via QEMU)
        if: ${{ matrix.qemu_arm }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"
          qemu-aarch64-static -L /usr/aarch64-linux-gnu "$BIN" --version
          qemu-aarch64-static -L /usr/aarch64-linux-gnu "$BIN" --help >/dev/null

      - name: Smoke (native commands)
        if: ${{ !matrix.qemu_arm }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"
          "$BIN" --version
          "$BIN" --help >/dev/null
          "$BIN" run --help >/dev/null

      - name: Verify strict-v3 fail-fast behavior
        if: ${{ matrix.artifact_name == 'linux-x86_64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"

          tmp_dir="$(mktemp -d)"
          mkdir -p "${tmp_dir}/source"
          cat >"${tmp_dir}/capsule.toml" <<'EOF'
          schema_version = "0.2"
          name = "strict-v3-ci-check"
          version = "0.1.0"
          type = "app"
          default_target = "cli"

          [targets.cli]
          runtime = "source"
          driver = "native"
          entrypoint = "source/main.py"
          EOF
          cat >"${tmp_dir}/source/main.py" <<'EOF'
          print("strict v3 check")
          EOF

          set +e
          "$BIN" build "${tmp_dir}" --strict-v3 >"${tmp_dir}/stdout.log" 2>"${tmp_dir}/stderr.log"
          status=$?
          set -e
          if [[ $status -eq 0 ]]; then
            echo "strict-v3 check unexpectedly succeeded" >&2
            cat "${tmp_dir}/stdout.log" >&2 || true
            cat "${tmp_dir}/stderr.log" >&2 || true
            exit 1
          fi
          if ! grep -qiE "strict-v3|Strict v3 fallback is not allowed" "${tmp_dir}/stderr.log"; then
            echo "strict-v3 failure message not found in stderr" >&2
            cat "${tmp_dir}/stderr.log" >&2 || true
            exit 1
          fi

      - name: Verify keyring fail-closed/auth bypass behavior
        if: ${{ matrix.artifact_name == 'linux-x86_64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"
          tmp_home="$(mktemp -d)"

          set +e
          env -u ATO_TOKEN HOME="$tmp_home" "$BIN" source rebuild --source-id src_123 --ref main --registry http://127.0.0.1:9 >"$tmp_home/no_token.stdout" 2>"$tmp_home/no_token.stderr"
          status_no_token=$?
          set -e
          if [[ $status_no_token -eq 0 ]]; then
            echo "Expected authentication failure without ATO_TOKEN" >&2
            exit 1
          fi
          if ! grep -qiE "Source operation requires authentication|Not authenticated" "$tmp_home/no_token.stderr"; then
            echo "Missing fail-closed auth error without ATO_TOKEN" >&2
            cat "$tmp_home/no_token.stderr" >&2 || true
            exit 1
          fi

          set +e
          HOME="$tmp_home" ATO_TOKEN=dummy "$BIN" source rebuild --source-id src_123 --ref main --registry http://127.0.0.1:9 >"$tmp_home/with_token.stdout" 2>"$tmp_home/with_token.stderr"
          status_with_token=$?
          set -e
          if [[ $status_with_token -eq 0 ]]; then
            echo "Expected preflight/network failure with dummy ATO_TOKEN" >&2
            exit 1
          fi
          if grep -qiE "Source operation requires authentication|Not authenticated" "$tmp_home/with_token.stderr"; then
            echo "ATO_TOKEN path unexpectedly failed due to authentication" >&2
            cat "$tmp_home/with_token.stderr" >&2 || true
            exit 1
          fi
          if ! grep -qiE "Failed to preflight source operation|Source preflight failed|Connection refused|error sending request" "$tmp_home/with_token.stderr"; then
            echo "Expected preflight/network error not found for dummy ATO_TOKEN path" >&2
            cat "$tmp_home/with_token.stderr" >&2 || true
            exit 1
          fi

      - name: Verify Linux dynamic dependencies
        if: ${{ matrix.artifact_name == 'linux-x86_64' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"
          ldd "$BIN" | tee /tmp/ato-ldd.txt
          if grep -q "not found" /tmp/ato-ldd.txt; then
            echo "Detected unresolved dynamic dependency" >&2
            exit 1
          fi

      - name: Verify macOS dynamic dependencies
        if: ${{ matrix.artifact_name == 'macos-host' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ steps.prep.outputs.binary }}"
          otool -L "$BIN" >/tmp/ato-otool.txt

  tar_pack_benchmark:
    name: Tar pack benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Benchmark (10k files)
        shell: bash
        run: |
          set -euo pipefail
          FILES=10000 scripts/ci/tar_pack_benchmark.sh

      - name: Benchmark (100k files)
        shell: bash
        run: |
          set -euo pipefail
          FILES=100000 scripts/ci/tar_pack_benchmark.sh

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tar-pack-benchmark
          path: /tmp/tar-pack-benchmark
          if-no-files-found: error

  upload_r2:
    name: Upload to R2
    needs:
      - build
      - smoke
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEFAULT_BUCKET_STAGING: ${{ secrets.R2_BUCKET_STAGING }}
      DEFAULT_BUCKET_PRODUCTION: ${{ secrets.R2_BUCKET_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        id: tag_main_check
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin main:refs/remotes/origin/main

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping R2 upload because tag commit is not contained in origin/main."
          fi

      - name: Check Cloudflare secrets
        id: secrets_check
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping R2 upload because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifacts
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: /tmp/ato-ci-artifacts

      - name: Set up Node.js
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler CLI
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        run: npm install -g wrangler@4

      - name: Prepare upload bundle
        id: prepare
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing required secrets: CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$cargo_version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            release_version="${cargo_version}-${GITHUB_SHA::7}"
          else
            release_version="$cargo_version"
          fi

          deploy_env="staging"
          update_latest="1"
          bucket_input=""
          source_dir="/tmp/ato-release/${release_version}"
          mkdir -p "$source_dir"

          mapfile -t archives < <(find /tmp/ato-ci-artifacts -type f \( -name 'ato-*.tar.gz' -o -name 'ato-*.zip' \) | sort)
          mapfile -t checksum_parts < <(find /tmp/ato-ci-artifacts -type f -name 'SHA256SUMS' | sort)

          if [[ "${#archives[@]}" -eq 0 ]]; then
            echo "No packaged archives found under /tmp/ato-ci-artifacts" >&2
            exit 1
          fi
          if [[ "${#checksum_parts[@]}" -eq 0 ]]; then
            echo "No SHA256SUMS files found under /tmp/ato-ci-artifacts" >&2
            exit 1
          fi

          cp "${archives[@]}" "$source_dir/"
          : > "$source_dir/SHA256SUMS"
          for checksum_part in "${checksum_parts[@]}"; do
            cat "$checksum_part" >> "$source_dir/SHA256SUMS"
          done
          sed -i.bak '/^[[:space:]]*$/d' "$source_dir/SHA256SUMS"
          rm -f "$source_dir/SHA256SUMS.bak"

          for archive in "$source_dir"/ato-*.tar.gz "$source_dir"/ato-*.zip; do
            if [[ ! -f "$archive" ]]; then
              continue
            fi
            archive_name="$(basename "$archive")"
            if ! grep -qE "[[:xdigit:]]{64}[[:space:]]+\*?${archive_name}$" "$source_dir/SHA256SUMS"; then
              echo "Missing checksum entry for ${archive_name}" >&2
              exit 1
            fi
          done

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$deploy_env" >> "$GITHUB_OUTPUT"
          echo "update_latest=$update_latest" >> "$GITHUB_OUTPUT"
          echo "bucket=$bucket_input" >> "$GITHUB_OUTPUT"
          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Upload archives to R2
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.release_version }}
          DEPLOY_ENV: ${{ steps.prepare.outputs.deploy_env }}
          UPDATE_LATEST: ${{ steps.prepare.outputs.update_latest }}
          BUCKET: ${{ steps.prepare.outputs.bucket }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (production mirror for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.release_version }}
          DEPLOY_ENV: production
          UPDATE_LATEST: ${{ steps.prepare.outputs.update_latest }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (semver alias for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.cargo_version }}
          DEPLOY_ENV: ${{ steps.prepare.outputs.deploy_env }}
          UPDATE_LATEST: 0
          BUCKET: ${{ steps.prepare.outputs.bucket }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (production semver alias for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.cargo_version }}
          DEPLOY_ENV: production
          UPDATE_LATEST: 0
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh