name: Build (Multi OS)

on:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: build-multi-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: ato
            build_target: ""
            rustflags: ""
          - os: macos-latest
            binary_name: ato
            build_target: ""
            rustflags: ""
          - os: windows-latest
            binary_name: ato.exe
            build_target: x86_64-pc-windows-msvc
            rustflags: -C target-feature=+crt-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify version source of truth
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -nE 's/^version = \"([^\"]+)\"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$cargo_version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag_version" != "$cargo_version" ]]; then
              echo "Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)" >&2
              exit 1
            fi
          fi

          version_input="${{ github.event.inputs.version }}"
          if [[ -n "$version_input" ]]; then
            version_input="${version_input#v}"
            if [[ ! "$version_input" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid workflow input version: $version_input" >&2
              exit 1
            fi
            if [[ "$version_input" != "$cargo_version" ]]; then
              echo "workflow_dispatch version ($version_input) must match Cargo.toml version ($cargo_version)" >&2
              exit 1
            fi
          fi

      - name: Validate Cargo.lock is up to date
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo metadata --locked --format-version 1 >/dev/null 2>&1; then
            echo "Cargo.lock is out of date for the current Cargo.toml." >&2
            echo "Run 'cargo generate-lockfile' (or 'cargo check') locally and commit Cargo.lock." >&2
            exit 1
          fi

      - name: Build release binary
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.build_target }}" ]]; then
            cargo build --release --locked --target "${{ matrix.build_target }}" --bin ato
          else
            cargo build --release --locked --bin ato
          fi

      - name: Verify strict-v3 fail-fast behavior
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          mkdir -p "${tmp_dir}/source"
          cat >"${tmp_dir}/capsule.toml" <<'EOF'
          schema_version = "0.2"
          name = "strict-v3-ci-check"
          version = "0.1.0"
          type = "app"
          default_target = "cli"

          [targets.cli]
          runtime = "source"
          driver = "native"
          entrypoint = "source/main.py"
          EOF
          cat >"${tmp_dir}/source/main.py" <<'EOF'
          print("strict v3 check")
          EOF

          set +e
          target/release/ato build "${tmp_dir}" --strict-v3 >"${tmp_dir}/stdout.log" 2>"${tmp_dir}/stderr.log"
          status=$?
          set -e
          if [[ ${status} -eq 0 ]]; then
            echo "strict-v3 check unexpectedly succeeded" >&2
            cat "${tmp_dir}/stdout.log" >&2 || true
            cat "${tmp_dir}/stderr.log" >&2 || true
            exit 1
          fi
          if ! grep -qiE "strict-v3|Strict v3 fallback is not allowed" "${tmp_dir}/stderr.log"; then
            echo "strict-v3 failure message not found in stderr" >&2
            cat "${tmp_dir}/stderr.log" >&2 || true
            exit 1
          fi

      - name: Package target archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          target_triple="$(rustc -vV | sed -n 's/^host: //p')"
          if [[ -z "$target_triple" ]]; then
            echo "failed to detect host target triple" >&2
            exit 1
          fi

          mkdir -p dist/payload
          binary_path="target/release/${{ matrix.binary_name }}"
          if [[ -n "${{ matrix.build_target }}" ]]; then
            binary_path="target/${{ matrix.build_target }}/release/${{ matrix.binary_name }}"
          fi
          cp "$binary_path" "dist/payload/${{ matrix.binary_name }}"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            archive_name="ato-${target_triple}.zip"
            powershell.exe -NoProfile -Command "Push-Location 'dist/payload'; Compress-Archive -Path '${{ matrix.binary_name }}' -DestinationPath '../${archive_name}' -Force; Pop-Location"
          else
            archive_name="ato-${target_triple}.tar.gz"
            tar -C dist/payload -czf "dist/${archive_name}" "${{ matrix.binary_name }}"
          fi

          echo "$target_triple" > "dist/target-triple.txt"
          echo "archive=dist/${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/ato-*.tar.gz
            dist/ato-*.zip
            dist/target-triple.txt
          if-no-files-found: error

  tar_pack_benchmark:
    name: Tar pack benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Benchmark (10k files)
        shell: bash
        run: |
          set -euo pipefail
          FILES=10000 scripts/ci/tar_pack_benchmark.sh

      - name: Benchmark (100k files)
        shell: bash
        run: |
          set -euo pipefail
          FILES=100000 scripts/ci/tar_pack_benchmark.sh

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tar-pack-benchmark
          path: /tmp/tar-pack-benchmark
          if-no-files-found: error

  upload_r2:
    name: Upload to R2
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DEFAULT_BUCKET_STAGING: ${{ secrets.R2_BUCKET_STAGING }}
      DEFAULT_BUCKET_PRODUCTION: ${{ secrets.R2_BUCKET_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        id: tag_main_check
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags origin main:refs/remotes/origin/main

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping R2 upload because tag commit is not contained in origin/main."
          fi

      - name: Check Cloudflare secrets
        id: secrets_check
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping R2 upload because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifacts
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: /tmp/ato-ci-artifacts
          merge-multiple: true

      - name: Set up Node.js
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler CLI
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        run: npm install -g wrangler@4

      - name: Prepare upload bundle
        id: prepare
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing required secrets: CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          cargo_version="$(sed -nE 's/^version = \"([^\"]+)\"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "$cargo_version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi

          version_input=""
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            release_version="${cargo_version}-${GITHUB_SHA::7}"
          else
            release_version="$cargo_version"
          fi

          deploy_env="staging"

          update_latest="1"

          bucket_input=""
          source_dir="/tmp/ato-release/${release_version}"
          mkdir -p "$source_dir"

          shopt -s nullglob
          archives=(/tmp/ato-ci-artifacts/ato-*.tar.gz /tmp/ato-ci-artifacts/ato-*.zip)
          if [[ "${#archives[@]}" -eq 0 ]]; then
            echo "No packaged archives found under /tmp/ato-ci-artifacts" >&2
            exit 1
          fi

          cp "${archives[@]}" "$source_dir/"
          (
            cd "$source_dir"
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 ato-*.tar.gz ato-*.zip > SHA256SUMS
            else
              sha256sum ato-*.tar.gz ato-*.zip > SHA256SUMS
            fi
          )

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$deploy_env" >> "$GITHUB_OUTPUT"
          echo "update_latest=$update_latest" >> "$GITHUB_OUTPUT"
          echo "bucket=$bucket_input" >> "$GITHUB_OUTPUT"
          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"

      - name: Upload archives to R2
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.release_version }}
          DEPLOY_ENV: ${{ steps.prepare.outputs.deploy_env }}
          UPDATE_LATEST: ${{ steps.prepare.outputs.update_latest }}
          BUCKET: ${{ steps.prepare.outputs.bucket }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (production mirror for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.release_version }}
          DEPLOY_ENV: production
          UPDATE_LATEST: ${{ steps.prepare.outputs.update_latest }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (semver alias for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.cargo_version }}
          DEPLOY_ENV: ${{ steps.prepare.outputs.deploy_env }}
          UPDATE_LATEST: 0
          BUCKET: ${{ steps.prepare.outputs.bucket }}
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh

      - name: Upload archives to R2 (production semver alias for main tag push)
        if: ${{ steps.tag_main_check.outputs.on_main == 'true' && steps.secrets_check.outputs.available == 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.prepare.outputs.cargo_version }}
          DEPLOY_ENV: production
          UPDATE_LATEST: 0
          SOURCE_DIR: ${{ steps.prepare.outputs.source_dir }}
          WRANGLER_CONFIG: ""
        run: ./scripts/upload_release_to_r2.sh
