name: Strict Sandbox CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    test-strict-sandbox:
        name: Strict Sandbox (Linux)
        runs-on: ubuntu-latest
        env:
            ATO_STRICT_CI: "1"
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Install Bubblewrap
              run: sudo apt-get update && sudo apt-get install -y bubblewrap

            - name: Build nacelle
              run: cargo build --manifest-path ../nacelle/Cargo.toml

            - name: Run fail-closed integration tests (strict)
              env:
                  NACELLE_PATH: ${{ github.workspace }}/../nacelle/target/debug/nacelle
              run: bash scripts/test_fail_closed.sh
